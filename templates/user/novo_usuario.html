{% extends 'base.html' %}

{% block title %}Novo Usuário | PetLar{% endblock %}

{% block content %}
<section class="row justify-content-center">
	<div class="col-12 col-lg-8">
		<div class="petlar-card p-4 p-md-5">
			<div class="form-header d-md-flex justify-content-between align-items-md-center mb-4">
				<div>
					<p class="text-uppercase text-muted small mb-1">Cadastro</p>
					<h1 class="h3 font-weight-bold mb-0">Cadastrar novo usuário</h1>
				</div>
				<a href="{% url 'listar_usuarios' %}" class="btn btn-outline-secondary btn-sm">Voltar</a>
			</div>

			<form method="post" enctype="multipart/form-data" novalidate>
				{% csrf_token %}
				{% for field in form %}
					<div class="mb-3">
						<label class="form-label font-weight-semibold" for="{{ field.id_for_label }}">{{ field.label }}</label>
						{{ field }}
						{% if field.errors %}
							<div class="text-danger small mt-1">{{ field.errors|striptags }}</div>
						{% endif %}
					</div>
				{% endfor %}
				<div class="form-actions mt-4">
					<a href="{% url 'listar_usuarios' %}" class="btn btn-light border">Cancelar</a>
					<button type="submit" class="btn btn-primary">Salvar usuário</button>
				</div>
			</form>
		</div>
	</div>
</section>
{% endblock %}
