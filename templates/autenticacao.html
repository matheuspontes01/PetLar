<!DOCTYPE html>
<html lang="pt-BR">
<head>
	{% load static %}
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Entrar | PetLar</title>
	<link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet">
	<link href="{% static 'css/petlar.css' %}" rel="stylesheet">
	<style>
		body { background: linear-gradient(180deg, #f0f7f8 0%, #f8fafc 35%, #eef2f7 100%); }
		.login-wrapper { min-height: 100vh; display:flex; align-items:center; justify-content:center; }
	</style>
</head>
<body>
	<main class="container login-wrapper">
		<div class="row justify-content-center w-100">
			<div class="col-12 col-sm-10 col-md-8 col-lg-5">
			<div class="petlar-card login-card p-4 p-md-5">
				<div class="text-center mb-4">
					<a class="petlar-brand justify-content-center mb-3" href="{% url 'login' %}">
						<span class="petlar-brand-mark">Pet</span><span class="petlar-brand-accent">Lar</span>
					</a>
					<h1 class="h3 font-weight-bold mb-2">Acesse sua conta</h1>
					<p class="text-muted mb-0">Conecte adotantes, ONGs e animais em busca de um novo lar.</p>
				</div>

				{% if mensagem %}
					<div class="alert alert-warning" role="alert">
						{{ mensagem }}
					</div>
				{% endif %}

				<form method="post" action="{% url 'login' %}">
					{% csrf_token %}
					<div class="mb-3">
						<label for="email" class="form-label font-weight-semibold">E-mail</label>
						<input type="email" class="form-control" id="email" name="email" placeholder="voce@email.com" required>
					</div>
					<div class="mb-4">
						<label for="senha" class="form-label font-weight-semibold">Senha</label>
						<input type="password" class="form-control" id="senha" name="senha" placeholder="Digite sua senha" required>
					</div>
					<button type="submit" class="btn btn-primary w-100 py-2">Entrar</button>
				</form>

				<div class="auth-signup-callout mt-4 pt-4 text-center">
					<p class="text-muted mb-2">Ainda não possui uma conta?</p>
					<a href="{% url 'cadastro_usuario' %}" class="btn btn-outline-primary w-100">Criar conta gratuita</a>
				</div>
			</div>
			</div>
		</div>
	</main>

	<script src="{% static 'js/jquery.js' %}"></script>
	<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
	<script src="{% static 'js/bootstrap.min.js' %}"></script>
</body>
</html>
